name: proxy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  flutter_native_splash: ^2.4.7

  # ── Local NoSQL Database ──────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # ── PDF Timetable Scanner ─────────────────────────────────────────────────────
  file_picker: ^8.1.7                  # Native file browser (cross-platform)
  syncfusion_flutter_pdf: ^28.2.12     # Reliable PDF text extraction
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Hive Code Generation ──────────────────────────────────────────────────────
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_native_splash:
  color: "#121212"
  image: assets/logo_cropped.png
  color_dark: "#121212"

  android_12:
    image: assets/logo_cropped.png
    color: "#121212"